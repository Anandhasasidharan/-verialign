name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,async]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Benchmark claim extraction
        run: |
          python -m verialign.scripts.benchmark_claims

      - name: Benchmark verification quality
        run: |
          python -m verialign.scripts.benchmark_verification

      - name: Type check (if mypy configured)
        run: |
          pip install mypy
          mypy verialign/ --ignore-missing-imports || true

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linting tools
        run: |
          pip install ruff

      - name: Run ruff
        run: |
          ruff check verialign/ tests/
          ruff format --check verialign/ tests/
