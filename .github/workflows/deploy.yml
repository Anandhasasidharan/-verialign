name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-fly:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'your-username'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-railway:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'your-username'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@v1.0.0
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: verialign
          environment: production

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push proxy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: verialign/deploy/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/verialign-proxy:latest

      - name: Build and push dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: verialign/deploy/Dockerfile.dashboard
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/verialign-dashboard:latest